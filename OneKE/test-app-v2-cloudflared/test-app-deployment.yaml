apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
spec:
  selector:
    matchLabels:
      app: test-app
  replicas: 2
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: test-app
          image: puffago/test-app:v2
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "db_dev"
            - name: MYSQL_DATABASE
              value: "app-db"
            - name: DB_HOST
              value: 'mariadb'
          ports:
            - containerPort: 5000